bundle:
  name: sap-mdm-cloud-migration

variables:
  workspace_host:
    description: Databricks workspace URL
    default: https://adb-0000.0.azuredatabricks.net
  catalog:
    default: mdm
  dbr_version:
    description: Databricks Runtime (LTS)
    default: 15.4.x-scala2.12

include:
  - bundles/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: mdm_dev
  stage:
    mode: production
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: mdm_stage
  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: mdm_prod

resources:
  jobs:
    sap_reconciliation:
      name: sap-reconciliation-${bundle.target}
      schedule:
        quartz_cron_expression: "0 0 4 * * ?"
        timezone_id: UTC
      email_notifications:
        on_failure: ["data-platform-oncall@example.com"]
      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
        - task_key: silver_normalize
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ./notebooks/02_silver_normalize.py
        - task_key: gold_reconcile
          depends_on:
            - task_key: silver_normalize
          notebook_task:
            notebook_path: ./notebooks/03_gold_reconcile.py
        - task_key: publish_to_redshift
          depends_on:
            - task_key: gold_reconcile
          notebook_task:
            notebook_path: ./notebooks/04_publish_downstream.py
        - task_key: predictive_optimization
          depends_on:
            - task_key: publish_to_redshift
          notebook_task:
            notebook_path: ./notebooks/05_maintenance.py
      job_clusters:
        - job_cluster_key: default
          new_cluster:
            spark_version: ${var.dbr_version}
            node_type_id: i3.xlarge
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.openlineage.transport.url: http://marquez.internal:5000
              spark.openlineage.namespace: sap-mdm-${bundle.target}
